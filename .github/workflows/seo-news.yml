name: SEO News

on:
  workflow_dispatch:
  schedule:
    # 01:17 UTC = 09:17 Malaysia / China time.
    - cron: "17 1 * * *"

permissions:
  contents: write

concurrency:
  group: seo-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.SEO_PUSH_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate configuration
        run: |
          python .github/actions/seo-news/generate.py \
            --workspace . \
            --config seo/news-config.json \
            --validate-config

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Generate SEO news pages
        id: seo_news
        uses: ./.github/actions/seo-news
        with:
          config: seo/news-config.json

      - name: Print generation summary
        run: |
          echo "Page entries: ${{ steps.seo_news.outputs.generated_count }}"
          echo "New entries: ${{ steps.seo_news.outputs.new_item_count }}"
          echo "Sources OK: ${{ steps.seo_news.outputs.source_success_count }}"
          echo "Sources failed: ${{ steps.seo_news.outputs.source_failure_count }}"
          echo "Page: ${{ steps.seo_news.outputs.page_path }}"

      - name: Commit generated content
        id: commit
        shell: bash
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No SEO news changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "seo: update curated technical news"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Cloudflare Pages build and deployment
        if: steps.commit.outputs.changed == 'true'
        shell: bash
        env:
          CLOUDFLARE_PAGES_DEPLOY_HOOK: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK }}
        run: |
          if [ -z "$CLOUDFLARE_PAGES_DEPLOY_HOOK" ]; then
            echo "::warning::CLOUDFLARE_PAGES_DEPLOY_HOOK is not configured."
            echo "::warning::Git push completed, but explicit Cloudflare deployment was not triggered."
            exit 0
          fi

          response_file="$(mktemp)"
          http_code="$(
            curl \
              --silent \
              --show-error \
              --location \
              --retry 3 \
              --retry-delay 2 \
              --retry-all-errors \
              --output "$response_file" \
              --write-out "%{http_code}" \
              --request POST \
              "$CLOUDFLARE_PAGES_DEPLOY_HOOK"
          )"

          cat "$response_file"
          echo

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Cloudflare Deploy Hook returned HTTP $http_code"
            exit 1
          fi

          echo "Cloudflare Pages deployment accepted (HTTP $http_code)."
